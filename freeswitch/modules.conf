# FreeSWITCH modules.conf
# ======================
# 模块加载配置 - 按功能分组

# ============ 核心模块（必须加载）============
# SIP 协议栈
mod_sofia

# MRCP 客户端（对接 UniMRCP）
mod_unimrcp

# ESL 事件Socket（对接 Orchestrator）
mod_event_socket

# 拨号工具（playback/record/detect_speech/transfer）
mod_dptools

# RTP 媒体处理
mod_rtp

# 音频格式支持
mod_sndfile
mod_native_file

# ============ 录音模块 =============
mod_avmd          # 语音活动检测
mod_signal_bridge # 信号桥接

# ============ 定时器 =============
mod_timer

# ============ 日志与调试（可选）============
# mod_console
# mod_logfile
# mod_syslog

# ============ 编码支持 =============
mod_codec2
mod_opus
mod_g711
mod_g722
mod_g723
mod_g729
mod_h263
mod_h264

# ============ 网关与路由（可选）============
# mod_dialplan_xml
# mod_curl
# mod_lua（如果用 Lua 脚本）

# ============ Redis（如果需要会话状态缓存）============
# mod_redis

# ============ 告警与监控（可选）============
# mod_snmp
# mod_cdr_csv
# mod_erlang_event